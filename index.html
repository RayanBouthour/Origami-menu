<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Origami Sushi Bar — Menu
    </title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>


<body>


    <!-- =====================================================
         ÉCRAN DE CHOIX DE LA LANGUE
         ===================================================== -->

    <div
        id="languageScreen"
        class="language-screen"
    >

        <div class="language-box">

            <div class="logo">
                ORIGAMI
            </div>


            <h1>
                Bienvenue
            </h1>


            <p>
                Choisissez votre langue
            </p>


            <div class="language-buttons">

                <button
                    class="language-choice"
                    data-language="fr"
                >

                    🇫🇷

                    <span>
                        Français
                    </span>

                </button>


                <button
                    class="language-choice"
                    data-language="en"
                >

                    🇬🇧

                    <span>
                        English
                    </span>

                </button>

            </div>

        </div>

    </div>



    <!-- =====================================================
         APPLICATION DU MENU
         ===================================================== -->

    <div
        id="menuApp"
        class="menu-app hidden"
    >


        <!-- =================================================
             HEADER
             ================================================= -->

        <header class="site-header">


            <!-- Bouton langue -->

            <button
                id="languageSwitcher"
                class="language-switcher"
            >

                🇫🇷 FR

            </button>



            <div class="header-content">

                <div class="logo">
                    ORIGAMI
                </div>


                <h1 id="menuTitle">
                    Notre Menu
                </h1>


                <p id="menuSubtitle">
                    Découvrez notre sélection
                </p>

            </div>


        </header>



        <!-- =================================================
             RECHERCHE
             ================================================= -->

        <div class="search-container">

            <div class="search-box">

                <input
                    type="text"
                    id="searchInput"
                    placeholder="Rechercher un plat..."
                    autocomplete="off"
                >


                <button
                    id="clearSearch"
                    class="clear-search"
                    aria-label="Effacer la recherche"
                >

                    ×

                </button>

            </div>

        </div>



        <!-- =================================================
             CATÉGORIES PRINCIPALES
             ================================================= -->

        <nav
            id="categoryNavigation"
            class="category-navigation"
        >
        </nav>



        <!-- =================================================
             SOUS-CATÉGORIES

             Cette barre apparaît lorsqu'une catégorie
             principale est sélectionnée.

             Elle est défilable horizontalement sur mobile.
             ================================================= -->

        <nav
            id="subcategoryNavigation"
            class="subcategory-navigation hidden"
        >
        </nav>



        <!-- =================================================
             CONTENU DU MENU
             ================================================= -->

        <main
            id="productsContainer"
            class="products-container"
        >
        </main>



        <!-- =================================================
             AUCUN RÉSULTAT
             ================================================= -->

        <div
            id="noResults"
            class="no-results hidden"
        >

            <h2>
                Aucun résultat
            </h2>


            <p>
                Aucun produit ne correspond à votre recherche.
            </p>

        </div>



        <!-- =================================================
             FOOTER
             ================================================= -->

        <footer class="site-footer">

            <div class="logo">
                ORIGAMI
            </div>


            <p>
                ©
                <span id="currentYear"></span>
                Origami Sushi Bar
            </p>

        </footer>


    </div>



    <!-- =====================================================
         JAVASCRIPT
         ===================================================== -->

    <script
        src="script.js"
    ></script>


</body>

</html>
