<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

    <!-- Mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Description -->
    <meta
        name="description"
        content="Découvrez le menu Origami Sushi Bar."
    >

    <title>Origami Sushi Bar — Menu</title>

    <!-- Police Google Fonts -->
    <!-- Tu peux changer la police ici si besoin -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap"
        rel="stylesheet"
    >

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- =====================================================
         ÉCRAN DE CHOIX DE LA LANGUE
         ===================================================== -->

    <div id="languageScreen" class="language-screen">

        <div class="language-box">

            <div class="brand-logo">
                ORIGAMI
            </div>

            <div class="brand-subtitle">
                SUSHI BAR
            </div>

            <div class="language-title">
                <span class="fr-text">
                    Bienvenue
                </span>

                <span class="en-text">
                    Welcome
                </span>
            </div>

            <p class="language-description">
                Choisissez votre langue
                <br>
                Choose your language
            </p>

            <div class="language-buttons">

                <button
                    class="language-choice"
                    data-language="fr"
                >
                    🇫🇷
                    <span>Français</span>
                </button>

                <button
                    class="language-choice"
                    data-language="en"
                >
                    🇬🇧
                    <span>English</span>
                </button>

            </div>

        </div>

    </div>


    <!-- =====================================================
         SITE PRINCIPAL
         ===================================================== -->

    <div id="menuApp" class="menu-app hidden">


        <!-- =================================================
             HEADER
             ================================================= -->

        <header class="header">

            <!-- Bouton langue fixe en haut à gauche -->

            <button
                id="languageSwitcher"
                class="language-switcher"
                aria-label="Change language"
            >
                🇫🇷 FR
            </button>


            <!-- Logo -->

            <div class="header-logo">

                <div class="logo-main">
                    ORIGAMI
                </div>

                <div class="logo-sub">
                    SUSHI BAR
                </div>

            </div>

        </header>



        <!-- =================================================
             CONTENU
             ================================================= -->

        <main class="main-content">


            <!-- Introduction -->

            <section class="menu-intro">

                <h1
                    id="menuTitle"
                    data-fr="Notre Menu"
                    data-en="Our Menu"
                >
                    Notre Menu
                </h1>

                <p
                    id="menuSubtitle"
                    data-fr="Découvrez notre sélection"
                    data-en="Discover our selection"
                >
                    Découvrez notre sélection
                </p>

            </section>



            <!-- =================================================
                 RECHERCHE
                 ================================================= -->

            <div class="search-container">

                <input
                    type="search"
                    id="searchInput"
                    placeholder="Rechercher un plat..."
                    autocomplete="off"
                >

                <button
                    id="clearSearch"
                    class="clear-search"
                    aria-label="Clear search"
                >
                    ×
                </button>

            </div>



            <!-- =================================================
                 CATÉGORIES
                 ================================================= -->

            <nav
                id="categoryNavigation"
                class="category-navigation"
                aria-label="Menu categories"
            >

                <!-- Les catégories seront automatiquement
                     générées par JavaScript -->

            </nav>



            <!-- =================================================
                 LISTE DES PRODUITS
                 ================================================= -->

            <section
                id="productsContainer"
                class="products-container"
            >

                <!-- Les produits seront automatiquement
                     générés par JavaScript -->

            </section>



            <!-- =================================================
                 MESSAGE SI AUCUN PRODUIT
                 ================================================= -->

            <div
                id="noResults"
                class="no-results hidden"
            >

                <div class="no-results-icon">
                    🍣
                </div>

                <h2
                    data-fr="Aucun résultat"
                    data-en="No results"
                >
                    Aucun résultat
                </h2>

                <p
                    data-fr="Aucun produit ne correspond à votre recherche."
                    data-en="No product matches your search."
                >
                    Aucun produit ne correspond à votre recherche.
                </p>

            </div>


        </main>



        <!-- =================================================
             FOOTER
             ================================================= -->

        <footer class="footer">

            <div class="footer-logo">
                ORIGAMI
            </div>

            <div class="footer-subtitle">
                SUSHI BAR
            </div>

            <p>
                © <span id="currentYear"></span>
                Origami Sushi Bar
            </p>

        </footer>


    </div>


    <!-- =====================================================
         JAVASCRIPT
         ===================================================== -->

    <script src="script.js"></script>

</body>
</html>
